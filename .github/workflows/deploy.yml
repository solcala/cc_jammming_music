name: Build, Test, and Deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest unit tests with coverage
        run: npm run test:coverage

      - name: Write Jest CI summary for Slack
        if: always()
        run: node scripts/write-jest-ci-summary.js

      - name: Publish coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const { total } = require('./coverage/coverage-summary.json');
              const row = (label, key) =>
                '| ' + label + ' | ' + total[key].pct + '% (' + total[key].covered + '/' + total[key].total + ') |';
              console.log([
                '## Jest coverage',
                '| Metric | Result |',
                '| --- | --- |',
                row('Statements', 'statements'),
                row('Branches', 'branches'),
                row('Functions', 'functions'),
                row('Lines', 'lines'),
                '',
                'Download the full HTML report from the **coverage** artifact.',
              ].join('\n'));
            " >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Jest coverage" >> "$GITHUB_STEP_SUMMARY"
            echo "Coverage report not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build React app
        env:
          REACT_APP_SPOTIFY_CLIENT_ID: ${{ fromJSON(toJSON(secrets)).REACT_APP_SPOTIFY_CLIENT_ID || 'test-client-id' }}
          REACT_APP_REDIRECT_URI: https://solcala.github.io/cc_jammming_music/
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          retention-days: 7

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-build-and-unit
          path: test-results/
          retention-days: 7

  e2e:
    needs: build_and_unit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
      options: --ipc=host

    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build

      - name: Run Playwright tests
        id: playwright
        run: npm run test:e2e:ci

      - name: Write Playwright CI summary for Slack
        if: always()
        run: |
          node scripts/write-playwright-ci-summary.js
          mkdir -p ci-summary
          cp test-results/e2e.json ci-summary/e2e.json
        env:
          PLAYWRIGHT_STEP_OUTCOME: ${{ steps.playwright.outcome }}

      - name: Upload e2e summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-e2e
          path: ci-summary/e2e.json
          retention-days: 7


      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Publish e2e summary
        if: always()
        run: |
          {
            echo "## E2E test summary"
            echo "- Playwright report artifact: **playwright-report-${{ github.run_id }}**"
            echo "- Live report (after successful deploy): https://solcala.github.io/cc_jammming_music/reports/index.html"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: [build_and_unit, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build

      - name: Download Playwright report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: .

      - name: Embed Playwright report in build output
        run: mkdir -p build/reports && cp -r playwright-report/* build/reports/

      - name: Publish workflow summary
        if: always()
        run: |
          {
            echo "## Test and deploy summary"
            echo "- App URL: https://solcala.github.io/cc_jammming_music/"
            echo "- Playwright report (after successful deploy): https://solcala.github.io/cc_jammming_music/reports/index.html"
            echo "- Jest coverage: see **build_and_unit** job summary and **coverage** artifact"
            echo "- Playwright report artifact: **playwright-report-${{ github.run_id }}**"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Confirm deployment
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "Deployed to GitHub Pages at https://solcala.github.io/cc_jammming_music/" >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy to GitHub Pages
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build

      - name: Write deploy CI summary for Slack
        if: always()
        run: |
          node scripts/write-deploy-ci-summary.js
          mkdir -p ci-summary
          cp test-results/deploy.json ci-summary/deploy.json
        env:
          DEPLOYED: ${{ steps.pages.outcome == 'success' && 'true' || 'false' }}
          JOB_FAILED: ${{ failure() && 'true' || 'false' }}

      - name: Upload deploy summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-deploy
          path: ci-summary/deploy.json
          retention-days: 7

  notify:
    needs: [build_and_unit, e2e, deploy]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build_and_unit summary
        if: needs.build_and_unit.result != 'cancelled'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: test-results-build-and-unit
          path: ci-reports/build_and_unit

      - name: Download e2e summary
        if: needs.e2e.result != 'cancelled'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: test-results-e2e
          path: ci-reports/e2e

      - name: Download deploy summary
        if: needs.deploy.result != 'cancelled'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: test-results-deploy
          path: ci-reports/deploy

      - name: Merge CI report
        env:
          BUILD_AND_UNIT_RESULT: ${{ needs.build_and_unit.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/merge-ci-report.js

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/send-slack-report.js --report test-results/ci-report.json
